name: Build Octofit App

on:
  workflow_dispatch:
  push:
    branches:
      - build-octofit-app
    paths:
      - 'octofit-tracker/backend/**'
      - 'octofit-tracker/frontend/**'
      - '.github/workflows/build.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            octofit-tracker/backend/package-lock.json
            octofit-tracker/frontend/package-lock.json

      - name: Install backend dependencies
        run: npm install --prefix octofit-tracker/backend

      - name: Build backend
        run: npm run build --prefix octofit-tracker/backend

      - name: Install frontend dependencies
        run: npm install --prefix octofit-tracker/frontend

      - name: Build frontend
        run: npm run build --prefix octofit-tracker/frontend
